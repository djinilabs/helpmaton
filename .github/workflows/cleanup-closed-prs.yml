name: Nightly Cleanup Closed PR Stacks

on:
  schedule:
    - cron: "0 * * * *" # Every hour at minute 0
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Security: Explicit permissions - only what's needed (no id-token; using static AWS creds)
    permissions:
      contents: read
      pull-requests: read

    concurrency:
      group: nightly-cleanup-closed-prs
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      # GH_TOKEN must not be set here: gh refuses to store credentials when it is set
      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Run cleanup of closed PR stacks
        run: bash scripts/cleanup-closed-prs.sh --force

      - name: Run cleanup of CloudWatch log groups for closed PRs
        run: bash scripts/cleanup-pr-log-groups.sh --force

      - name: Run cleanup of API Gateway API Keys for closed PRs
        run: bash scripts/cleanup-pr-api-keys.sh --force
